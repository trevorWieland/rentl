# Verified Models Registry
#
# Data-driven list of models verified to work through rentl's full pipeline.
# Adding a new model requires only adding a new [[models]] entry here —
# no code changes needed.
#
# Fields:
#   model_id        — Provider-specific model identifier
#   endpoint_type   — "local" (LM Studio) or "openrouter"
#   endpoint_ref    — Reference to configured endpoint name
#   load_endpoint   — (local only) LM Studio model load API URL
#   config_overrides — Per-model overrides (timeout, temperature, etc.)
#
# Budget: quality tests enforce a 30s pytest-timeout.  The verification
# runner executes phases sequentially with fail-fast (stops on first
# failure), so per-call timeout_s and max_output_retries must stay within
# that budget for passing models.  Current rule of thumb:
#   5 phases × (1 + max_output_retries) × timeout_s  ≤  30 s
#   Local:      5 × 2 × 3 = 30 s  (max_output_retries=1, timeout_s=3.0, load uses load_timeout_s)
#   OpenRouter: 5 × 2 × 2.5 = 25 s  (max_output_retries=1, timeout_s=2.5)

# ──────────────────────────────────────────────────────────────
# Local models (LM Studio)
# ──────────────────────────────────────────────────────────────

[[models]]
model_id = "google/gemma-3-27b"
endpoint_type = "local"
endpoint_ref = "lm-studio"
load_endpoint = "http://192.168.1.23:1234/api/v1/models/load"

[models.config_overrides]
timeout_s = 3.0
load_timeout_s = 120.0
max_output_retries = 1

